title: Hoist torch_npu imports and enforce NPU-only device selection
pattern: (?m)^import torch\n(?!import torch_npu\n)
replacement: import torch
import torch_npu

npu = getattr(torch, "npu", None)
if npu is None or not npu.is_available():
    raise RuntimeError("Ascend NPU is required; CPU fallback is forbidden")
DEVICE = "npu:0"

file_patterns: ["*.py"]
target_roles: ["code_adapter", "migration_validator", "npu_runtime_enforcer"]
target_phases: ["code_adaptation", "post_rewrite_syntax_validation", "runtime_validation"]
trigger_fingerprint: {'migration_context': 'CUDA-to-NPU PyTorch migration using torch_npu', 'positive_signals': ['import torch with injected import torch_npu', 'torch_npu import appears in nested or exception-handler scope', 'IndentationError or syntax failure after import injection', 'device-selection logic contains CPU or CUDA fallback', 'validation entrypoint must run only on Ascend NPU'], 'required_rule_actions': ['hoist import torch_npu to module-level imports near import torch', 'insert immediate torch.npu availability gate after imports', 'raise RuntimeError when NPU is unavailable', 'set active runtime device to npu:0', 'rerun syntax/import validation and migrated runtime command'], 'anti_patterns': ['placing backend imports inside except blocks or interactive loops', 'silently falling back to CPU', 'preserving CUDA device selection after NPU migration']}
