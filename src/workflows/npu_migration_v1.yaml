name: npu_migration
version: 1
description: CUDA to Ascend NPU migration workflow

globals:
  max_retry_per_phase: 3
  artifacts_dir: ".sm-adaptifacts"

phases:
  - id: phase_0
    name: Environment Detection
    prompt_template: "src/prompts/phase_0_env_detect.md"
    output_schema:
      $ref: "src/schemas/phase_0_env_detect.json"
    validator: env_detect
    transitions:
      on_success: phase_1
      on_failure: error_recovery

  - id: phase_1
    name: Project Analysis
    prompt_template: "src/prompts/phase_1_project_analysis.md"
    output_schema:
      $ref: "src/schemas/phase_1_project_analysis.json"
    validator: project_analysis
    transitions:
      on_success: phase_2
      on_failure: error_recovery

  - id: phase_2
    name: Virtual Environment Setup
    prompt_template: "src/prompts/phase_2_venv_create.md"
    output_schema:
      $ref: "src/schemas/phase_2_venv.json"
    validator: venv
    transitions:
      on_success: phase_3
      on_failure: error_recovery

  - id: phase_3
    name: Entry Script Analysis
    prompt_template: "src/prompts/phase_3_entry_script.md"
    output_schema:
      $ref: "src/schemas/phase_3_entry_script.json"
    validator: entry_script
    transitions:
      on_success: phase_35
      on_failure: phase_3

  - id: phase_35
    name: Entry Script Static Compliance Check
    prompt_template: "src/prompts/phase_35_static_validate.md"
    output_schema:
      $ref: "src/schemas/phase_35_static_validate.json"
    validator: entry_static
    transitions:
      on_success: phase_4
      on_failure: phase_3

  - id: phase_4
    name: Rule Migration
    prompt_template: "src/prompts/phase_4_rule_migration.md"
    output_schema:
      $ref: "src/schemas/phase_4_rule_migration.json"
    validator: rule_migration
    transitions:
      on_success: phase_5
      on_failure: error_recovery

  - id: phase_5
    name: Final Validation
    prompt_template: "src/prompts/phase_5_validation.md"
    output_schema:
      $ref: "src/schemas/phase_5_validation_final.json"
    validator: validation_final
    transitions:
      on_success: phase_6
      on_failure: error_recovery

  - id: phase_6
    name: Reports
    prompt_template: "src/prompts/phase_6_report.md"
    output_schema:
      $ref: "src/schemas/phase_6_reports.json"
    validator: reports
    transitions:
      on_success: complete
      on_failure: error_recovery

  - id: error_recovery
    name: Error Recovery
    prompt_template: "src/prompts/phase_error_recovery.md"
    output_schema: {}
    validator: null
    transitions:
      on_success: resume
      on_failure: failed

terminals:
  - complete
  - complete_partial
  - failed
  - resume
