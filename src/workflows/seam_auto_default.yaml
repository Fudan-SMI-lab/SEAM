# SEAM Auto-Default Meta-YAML — Workflow Selector
#
# This is the default workflow selector for run_seam.sh.
# The "build" agent inspects the project and runtime environment,
# then selects the best candidate workflow for the current platform.
#
# Overrides enforce production-appropriate defaults:
#   - execution_backend.mode: auto → runtime/container availability checks
#   - experience features disabled for reproducibility
#   - review gate disabled, max_repair_iterations: 8

kind: workflow_selector
name: "seam-auto-default"
description: "Production auto-select workflow for SEAM multi-platform migration"
selector:
  agent: "build"
candidate_workflows:
  - path: "musa_muxi_migration_v2_container_baseaware_entryfix_normal.yaml"
    description: "MUSA/Muxi migration with container and normal entry-script validation (no custom-op gate)"
  - path: "musa_muxi_migration_v2_container_baseaware_entryfix_sglang.yaml"
    description: "MUSA/Muxi migration with container, SGLang/MACA normal entry-script validation"
  - path: "musa_muxi_migration_v2_container_baseaware_entryfix.yaml"
    description: "MUSA/Muxi migration with container, base-aware dependency selection, and custom-op gate support"
  - path: "ppu_migration_v2_auto_vllm018_smoke_baseaware_entryfix_keep.yaml"
    description: "PPU migration with auto-mode vLLM 0.18 smoke build, base-aware, entry-fix, keep output"
  - path: "ppu_migration_v2_container.yaml"
    description: "PPU migration with container backend"
  - path: "npu_migration_v2.yaml"
    description: "Ascend NPU migration (CUDA -> Ascend)"
overrides:
  execution_backend:
    mode: auto
  experience:
    enabled: false
    memory_enabled: false
    phase7_enabled: false
  globals:
    max_repair_iterations: 8
    review_gate_enabled: false
    max_review_iterations: 2
